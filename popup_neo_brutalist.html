<!doctype html>
<html>
  <head>
    <meta charset="UTF-8" />
    <link
      href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=Bebas+Neue&display=swap"
      rel="stylesheet"
    />
    <style>
      *,
      *::before,
      *::after {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
      }

      :root {
        --black: #0a0a0a;
        --white: #f5f0e8;
        --yellow: #ffe000;
        --red: #ff3b3b;
        --border-color: var(--black);
        --border: 2.5px solid var(--border-color);
        --shadow: 4px 4px 0px var(--border-color);
      }

      @media (prefers-color-scheme: dark) {
        :root {
          --black: #f5f0e8;
          --white: #0a0a0a;
          --border-color: #f5f0e8;
        }
      }

      body {
        width: 460px;
        background: var(--white);
        color: var(--black);
        font-family: "Space Mono", monospace;
        padding: 0;
        overflow-x: hidden;
        transition:
          background 0.2s,
          color 0.2s;
      }

      .header {
        padding: 14px 16px 12px;
        display: flex;
        align-items: baseline;
        justify-content: space-between;
      }

      .header h1 {
        font-family: "Bebas Neue", sans-serif;
        font-size: 28px;
        color: var(--yellow);
        letter-spacing: 2px;
        line-height: 1;
      }

      .header-sub {
        font-size: 9px;
        color: #888;
        letter-spacing: 1px;
        text-transform: uppercase;
      }

      .body {
        padding: 14px;
      }

      .search-wrap {
        display: flex;
        border: var(--border);
        box-shadow: var(--shadow);
        background: var(--white);
        margin-bottom: 12px;
      }

      .search-wrap input {
        flex: 1;
        padding: 10px 12px;
        font-family: "Space Mono", monospace;
        font-size: 12px;
        border: none;
        background: transparent;
        color: var(--black);
        outline: none;
      }

      .search-wrap input::placeholder {
        color: var(--black);
        opacity: 0.4;
      }

      .search-btn {
        background: var(--yellow);
        border: none;
        border-left: var(--border);
        padding: 0 14px;
        cursor: pointer;
        font-family: "Bebas Neue", sans-serif;
        font-size: 16px;
        letter-spacing: 1px;
        color: #0a0a0a;
        transition: background 0.1s;
      }

      .search-btn:hover {
        background: #e6ca00;
      }
      .search-btn:active {
        transform: translate(2px, 2px);
        box-shadow: none;
      }

      #status {
        font-size: 10px;
        letter-spacing: 0.5px;
        color: var(--black);
        opacity: 0.6;
        margin-bottom: 10px;
        min-height: 14px;
        text-transform: uppercase;
      }

      #status.loading {
        opacity: 1;
        animation: blink 0.8s step-end infinite;
      }
      @keyframes blink {
        50% {
          opacity: 0.3;
        }
      }

      /* Recents */
      #recents-section {
        display: none;
        margin-bottom: 14px;
        border: var(--border);
        box-shadow: var(--shadow);
      }

      .recents-header {
        display: flex;
        align-items: center;
        justify-content: space-between;
        padding: 5px 8px;
        border-bottom: var(--border);
        background: var(--black);
      }

      .recents-label {
        font-family: "Bebas Neue", sans-serif;
        font-size: 13px;
        letter-spacing: 1.5px;
        color: var(--yellow);
      }

      .clear-btn {
        background: none;
        border: none;
        width: auto;
        padding: 0;
        font-family: "Space Mono", monospace;
        font-size: 9px;
        letter-spacing: 1px;
        text-transform: uppercase;
        color: #888;
        cursor: pointer;
        transition: color 0.15s;
      }

      .clear-btn:hover {
        color: var(--red);
        opacity: 1;
      }

      #recents {
        display: flex;
        gap: 0;
        overflow-x: auto;
        scrollbar-width: thin;
        scrollbar-color: var(--black) var(--white);
      }

      #recents::-webkit-scrollbar {
        height: 3px;
      }
      #recents::-webkit-scrollbar-thumb {
        background: var(--black);
      }

      .recent-item {
        flex: 0 0 80px;
        height: 60px;
        object-fit: cover;
        cursor: pointer;
        border-right: var(--border);
        display: block;
        transition: opacity 0.15s;
        filter: saturate(0.8);
      }

      .recent-item:last-child {
        border-right: none;
      }
      .recent-item:hover {
        opacity: 0.8;
        filter: saturate(1.2);
      }

      /* Results */
      #results {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 12px;
        max-height: 420px;
        overflow-y: auto;
        scrollbar-width: thin;
        scrollbar-color: var(--black) var(--white);
        padding: 2px;
      }

      .gif-wrap {
        border: var(--border);
        box-shadow: var(--shadow);
        background: var(--black);
        opacity: 0.9;
        overflow: hidden;
        cursor: grab;
        position: relative;
        transition:
          transform 0.12s,
          box-shadow 0.12s;
      }

      .gif-wrap:hover {
        transform: translate(-2px, -2px);
        box-shadow: 6px 6px 0px var(--black);
      }

      .gif-wrap:active {
        cursor: grabbing;
      }

      .gif-wrap img {
        width: 100%;
        display: block;
        pointer-events: none;
        user-select: none;
      }

      .gif-wrap .drag-hint {
        position: absolute;
        bottom: 0;
        left: 0;
        right: 0;
        background: var(--yellow);
        border-top: var(--border);
        font-size: 9px;
        font-family: "Space Mono", monospace;
        text-align: center;
        padding: 3px 0;
        letter-spacing: 1px;
        text-transform: uppercase;
        transform: translateY(100%);
        transition: transform 0.15s;
        color: #0a0a0a;
      }

      .gif-wrap:hover .drag-hint {
        transform: translateY(0);
      }

      .gif-wrap.is-dragging {
        opacity: 0.5;
        transform: rotate(-3deg) scale(0.97);
        box-shadow: 2px 2px 0 var(--black);
        cursor: grabbing;
        border: 1px solid black;
      }

      .gif-wrap.copied .drag-hint {
        background: var(--red);
        color: var(--white);
        transform: translateY(0);
      }

      .drag-ghost {
        position: fixed;
        pointer-events: none;
        z-index: 9999;
        border: var(--border);
        box-shadow: 8px 8px 0 var(--black);
        transform: rotate(4deg) scale(1.05);
        opacity: 0.92;
        transition: none;
      }

      .settings-toggle {
        display: block;
        width: 100%;
        background: transparent;
        border: none;
        border-top: var(--border);
        padding: 8px;
        font-family: "Space Mono", monospace;
        font-size: 10px;
        letter-spacing: 1px;
        text-transform: uppercase;
        cursor: pointer;
        color: var(--black);
        opacity: 0.6;
        text-align: center;
        margin-top: 10px;
      }

      .settings-toggle:hover {
        background: var(--black);
        color: var(--yellow);
        opacity: 1;
      }

      #settings {
        display: none;
        border-top: var(--border);
        padding-top: 12px;
        margin-top: 2px;
      }

      .settings-label {
        font-size: 9px;
        text-transform: uppercase;
        letter-spacing: 1px;
        color: var(--black);
        opacity: 0.5;
        margin-bottom: 4px;
      }

      .settings-field {
        border: var(--border);
        margin-bottom: 10px;
      }

      .settings-field input {
        width: 100%;
        padding: 8px 10px;
        font-family: "Space Mono", monospace;
        font-size: 11px;
        border: none;
        background: var(--white);
        color: var(--black);
        outline: none;
      }

      .save-btn {
        width: 100%;
        padding: 10px;
        background: var(--black);
        color: var(--yellow);
        border: var(--border);
        box-shadow: var(--shadow);
        font-family: "Bebas Neue", sans-serif;
        font-size: 18px;
        letter-spacing: 2px;
        cursor: pointer;
        transition:
          transform 0.1s,
          box-shadow 0.1s;
      }

      .save-btn:hover {
        background: #222;
      }
      .save-btn:active {
        transform: translate(4px, 4px);
        box-shadow: none;
      }

      .load-more-btn {
        width: 100%;
        margin-top: 12px;
        padding: 10px;
        background: var(--white);
        color: var(--black);
        border: var(--border);
        box-shadow: var(--shadow);
        font-family: "Bebas Neue", sans-serif;
        font-size: 18px;
        letter-spacing: 2px;
        cursor: pointer;
        transition:
          transform 0.1s,
          box-shadow 0.1s;
      }

      .load-more-btn:hover {
        background: var(--yellow);
        color: #0a0a0a;
      }
      .load-more-btn:active {
        transform: translate(2px, 2px);
        box-shadow: none;
      }
    </style>
  </head>
  <body>
    <div class="header">
      <h1>VIBE GIF</h1>
      <span class="header-sub">drag to any chat</span>
    </div>

    <div class="body">
      <div id="status">ready</div>

      <div class="search-wrap">
        <input type="text" id="query" placeholder="describe the vibe..." />
        <button class="search-btn" id="search-btn">GO</button>
      </div>

      <div id="recents-section">
        <div class="recents-header">
          <span class="recents-label">Recently Used</span>
          <button class="clear-btn" id="clear-recents">clear</button>
        </div>
        <div id="recents"></div>
      </div>

      <div id="results"></div>
      <button class="load-more-btn" id="load-more" style="display: none">
        Load more
      </button>
      <button class="settings-toggle" id="toggle_settings">// settings</button>

      <div id="settings">
        <p class="settings-label">Gemini key</p>
        <div class="settings-field">
          <input type="password" id="gemini_key_input" placeholder="AIza..." />
        </div>
        <p class="settings-label">GIPHY key</p>
        <div class="settings-field">
          <input
            type="password"
            id="giphy_key_input"
            placeholder="your key..."
          />
        </div>
        <button class="save-btn" id="save_keys">SAVE</button>
      </div>
    </div>

    <script src="popup.js"></script>
  </body>
</html>
