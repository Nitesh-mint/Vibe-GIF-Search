<!DOCTYPE html>
<html>
<head>
  <style>
    body { width: 320px; font-family: sans-serif; padding: 15px; background: #121212; color: white; }
    input { width: 100%; padding: 10px; border-radius: 8px; border: none; outline: none; margin-bottom: 10px; box-sizing: border-box; }
    #results { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; max-height: 400px; overflow-y: auto; }
    .gif-item { width: 100%; border-radius: 4px; cursor: pointer; }
    .status { font-size: 12px; color: #888; margin-bottom: 5px; }
  </style>
</head>
<body>
  <h3>Vibe GIF Search</h3>
  <div class="status" id="status">Ready</div>
  <input type="text" id="query" placeholder="Describe the vibe.">
  <div id="results"></div>

  <div id="settings" style="display: none; margin-top: 15px; border-top: 1px solid #333; padding-top: 10px;">
    <div class="status">Settings</div>
    <input type="password" id="gemini_key_input" placeholder="Gemini API Key">
    <input type="password" id="giphy_key_input" placeholder="GIPHY API Key">
    <button id="save_keys" style="width: 100%; padding: 10px; border-radius: 8px; border: none; background: #3498db; color: white; cursor: pointer;">Save Keys</button>
  </div>
  
  <div style="text-align: center; margin-top: 10px;">
    <a href="#" id="toggle_settings" style="color: #888; font-size: 11px; text-decoration: none;">⚙️ Settings</a>
  </div>
  
  <script src="popup.js"></script>
</body>
</html>
